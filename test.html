<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test UI Element</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1f1f1f;
        background: #d3d3d3;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        background: #efefef;
        border: 1px solid #9d9d9d;
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
      }

      .card h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="card" aria-label="Test UI element">
      <h1>Test page</h1>
    </section>
  </body>
</html>
