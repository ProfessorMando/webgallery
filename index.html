<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Element Gallery</title>
    <link rel="stylesheet" href="styles.css?v=20260414c" />
  </head>
  <body>
    <div id="theme-wave" aria-hidden="true"></div>

    <header class="page-header">
      <h1>UI Element Gallery</h1>
      <label class="theme-switch" for="theme-toggle" aria-label="Toggle light and dark mode">
        <input id="theme-toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </header>

    <main class="content">
      <form class="selector-card" id="element-form">
        <label class="visually-hidden" for="element-select">Select a UI element to view</label>
        <select id="element-select" required>
          <option value="" selected disabled>Select a UI element to view</option>
          <option value="test.html">Test</option>
        </select>

        <button type="submit">View!</button>
      </form>
    </main>

    <script src="theme.js?v=20260414c"></script>
  </body>
</html>
